services:

  mysql:
    image: mysql:8
    container_name: mysql-devops
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ventas-api:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ventas-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ventasdb
      DB_USERNAME: root
      DB_PASSWORD: 1234
    depends_on:
      - mysql

  despacho-api:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: despacho-api
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: despachosdb
      DB_USERNAME: root
      DB_PASSWORD: 1234
    depends_on:
      - mysql

  front-despacho:
    build: ./front_despacho
    container_name: front-despacho
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - ventas-api
      - despacho-api

volumes:
  mysql_data: