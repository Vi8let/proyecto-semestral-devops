name: CI/CD Proyecto DevOps

on:
  push:
    branches:
      - deploy        # Solo se activa cuando haces push a la rama deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ================== BUILD & PUSH FRONTEND ==================
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front_despacho
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest

      # ================== BUILD & PUSH BACKEND VENTAS ==================
      - name: Build & Push Backend Ventas
        uses: docker/build-push-action@v6
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-ventas:latest

      # ================== BUILD & PUSH BACKEND DESPACHOS ==================
      - name: Build & Push Backend Despachos
        uses: docker/build-push-action@v6
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/back-despachos:latest

      # ================ DEBUG: Check SSH connectivity ================
      - name: Check SSH connectivity to EC2
        env:
          HOST: ${{ secrets.FRONTEND_HOST }}
        run: |
          echo "Comprobando conectividad SSH a ${HOST}:22"
          # Intento rápido de conexión a puerto TCP 22. Sale con código distinto de 0 si falla.
          timeout 5 bash -c 'cat < /dev/tcp/'"${HOST}"'/22' && echo "Port 22 reachable" || (echo "ERROR: no se puede alcanzar ${HOST}:22 desde el runner" && exit 1)

      # ================== DEPLOY EN EC2 FRONTEND ==================
      - name: Deploy to EC2 Frontend
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          port: 22
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/proyecto-semestral-devops
            git pull origin deploy
            docker compose -f docker-compose-frontend.yml down
            docker compose -f docker-compose-frontend.yml pull
            docker compose -f docker-compose-frontend.yml up -d
            echo "✅ Frontend desplegado correctamente"
